_config_version: 30
model:
  default: claude-opus-4-8
  provider: anthropic
agent:
  max_turns: 150
  verbose: false
  reasoning_effort: medium
terminal:
  lifetime_seconds: 300
web:
  backend: firecrawl
  use_gateway: true
browser:
  cloud_provider: browser-use
  use_gateway: true
display:
  streaming: true
  tool_progress: all
  cleanup_progress: false
  long_running_notifications: true
  busy_ack_detail: true
  background_process_notifications: all
tts:
  provider: openai
  use_gateway: true
stt:
  provider: openai
  use_gateway: true
memory:
  provider: mnemosyne
  nudge_interval: 10
  flush_min_turns: 6
skills:
  creation_nudge_interval: 15
code_execution:
  timeout: 300
  max_tool_calls: 50
session_reset:
  mode: none
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
platform_toolsets:
  cli:
  - hermes-cli
  telegram:
  - hermes-telegram
image_gen:
  use_gateway: true

# Hyprlock — Rosé Pine Moon
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(3e8fb0)
    inner_color = rgb(232136)
    font_color = rgb(e0def4)
    fade_on_empty = true
    placeholder_text = <i>password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(e0def4)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

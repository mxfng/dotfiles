##################
### AUTOSTART  ###
##################

exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hypridle

################
### MONITORS ###
################

monitor = , preferred, auto, 1.25

# Second monitor: workspaces 7-8 on secondary
# Uncomment and adjust monitor name when connected:
# workspace = 7, monitor:1, default:true
# workspace = 8, monitor:1

###################
### MY PROGRAMS ###
###################

$terminal = wezterm
$menu = rofi -show drun

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

# Force Wayland for apps that default to XWayland
env = MOZ_ENABLE_WAYLAND, 1
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(e5e5e566)
    col.inactive_border = rgba(e5e5e518)
}

decoration {
    rounding = 10

    blur {
        size = 3
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

cursor {
    no_hardware_cursors = true
}

#############
### INPUT ###
#############

input {
    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        scroll_factor = 0.125
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mod = SUPER

# App-level
bind = $mod, return, exec, $terminal
bind = $mod, space, exec, $menu
bind = $mod, Q, killactive,
bind = $mod, W, killactive,
bind = $mod, escape, exec, hyprlock

# Window focus
bind = $mod ALT, H, movefocus, l
bind = $mod ALT, J, movefocus, d
bind = $mod ALT, K, movefocus, u
bind = $mod ALT, L, movefocus, r

# Move windows
bind = $mod ALT SHIFT, H, movewindow, l
bind = $mod ALT SHIFT, J, movewindow, d
bind = $mod ALT SHIFT, K, movewindow, u
bind = $mod ALT SHIFT, L, movewindow, r

# Resize
binde = $mod ALT, minus, resizeactive, -50 0
binde = $mod ALT, equal, resizeactive, 50 0

# Layout
bind = $mod ALT, Z, fullscreen, 0
bind = $mod ALT, T, togglefloating,

# Workspaces
bind = $mod ALT, 1, workspace, 1
bind = $mod ALT, 2, workspace, 2
bind = $mod ALT, 3, workspace, 3
bind = $mod ALT, 4, workspace, 4
bind = $mod ALT, 5, workspace, 5
bind = $mod ALT, 6, workspace, 6
bind = $mod ALT, 7, workspace, 7
bind = $mod ALT, 8, workspace, 8
bind = $mod ALT, left, workspace, -1
bind = $mod ALT, right, workspace, +1
bind = $mod ALT, TAB, workspace, previous

# Move window to workspace
bind = $mod ALT SHIFT, 1, movetoworkspace, 1
bind = $mod ALT SHIFT, 2, movetoworkspace, 2
bind = $mod ALT SHIFT, 3, movetoworkspace, 3
bind = $mod ALT SHIFT, 4, movetoworkspace, 4
bind = $mod ALT SHIFT, 5, movetoworkspace, 5
bind = $mod ALT SHIFT, 6, movetoworkspace, 6
bind = $mod ALT SHIFT, 7, movetoworkspace, 7
bind = $mod ALT SHIFT, 8, movetoworkspace, 8
bind = $mod ALT SHIFT, left, movetoworkspace, -1
bind = $mod ALT SHIFT, right, movetoworkspace, +1
bind = $mod ALT SHIFT, TAB, movecurrentworkspacetomonitor, +1

# Scratchpad
bind = $mod ALT, S, togglespecialworkspace, magic
bind = $mod ALT SHIFT, S, movetoworkspace, special:magic

# Mouse
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = force-border-wezterm
    match:class = ^(org\.wezfurlong\.wezterm)$
    decorate = true
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
